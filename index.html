<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 – Knockout Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C9A84C; --gold2:#F0C94A; --navy:#0A0E1A; --navy3:#1A2235;
    --gray:#6B7280; --white:#FFFFFF; --green:#22C55E; --red:#EF4444; --line:#2D3748;
  }
  html,body { width:1920px; height:1080px; overflow:hidden; background:var(--navy); font-family:'Inter',sans-serif; color:var(--white); }

  header { display:flex; align-items:center; gap:20px; padding:8px 32px; background:linear-gradient(135deg,#0A0E1A,#1A2235,#0D1B3E); border-bottom:2px solid var(--gold); height:72px; }
  .logo-placeholder { width:52px; height:52px; border:2px dashed var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--gold); text-align:center; line-height:1.3; padding:4px; flex-shrink:0; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; color:var(--gold2); }
  header p  { font-size:10px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .header-right { margin-left:auto; text-align:right; }
  .clock { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--white); letter-spacing:2px; }
  #statusBar { font-size:10px; color:var(--gray); margin-top:3px; }
  #statusBar.loading { color:var(--gold); }
  #statusBar.error   { color:var(--red); }

  .bracket-area { height:1008px; padding:6px 16px 24px; display:flex; align-items:center; overflow-x:auto; overflow-y:hidden; }
  .bracket-canvas { display:flex; align-items:center; height:960px; gap:0; flex-shrink:0; }

  .round-col { display:flex; flex-direction:column; flex-shrink:0; }
  .round-label { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--gold); text-align:center; padding-bottom:6px; line-height:1.2; }
  .round-sublabel { font-size:9px; color:var(--gray); font-family:'Inter',sans-serif; font-weight:400; display:block; letter-spacing:1px; }

  .match-box { background:var(--navy3); border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .match-box.is-tbd  { border-style:dashed; opacity:0.55; }
  .match-box.is-live { border-color:var(--green); box-shadow:0 0 8px rgba(34,197,94,0.3); }
  .team-row { display:flex; align-items:center; justify-content:space-between; padding:5px 8px; gap:4px; border-bottom:1px solid rgba(255,255,255,0.05); min-height:28px; }
  .team-row:last-of-type { border-bottom:none; }
  .team-row.winner { background:rgba(201,168,76,0.12); }
  .team-left { display:flex; align-items:center; gap:5px; overflow:hidden; }
  .flag-s { font-size:14px; line-height:1; flex-shrink:0; }
  .team-label { font-size:10px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:95px; }
  .team-label.tbd { color:var(--gray); font-weight:400; font-style:italic; font-size:9px; }
  .team-score { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--white); flex-shrink:0; min-width:14px; text-align:right; }
  .team-score.win { color:var(--gold2); }
  .team-score.lose { color:var(--gray); }
  .match-meta { text-align:center; font-size:8px; color:var(--gray); padding:2px 4px; border-top:1px solid rgba(255,255,255,0.04); white-space:nowrap; }
  .live-pip { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:3px; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .connector { flex-shrink:0; }

  .final-col { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; width:200px; flex-shrink:0; }
  .trophy { font-size:34px; filter:drop-shadow(0 0 8px var(--gold)); }
  .final-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--gold2); text-align:center; line-height:1.2; }
  .champion-box { background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(240,201,74,0.04)); border:1px solid var(--gold); border-radius:10px; padding:8px 14px; width:186px; text-align:center; }
  .champion-label { font-size:9px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .champion-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--gold2); }
  .note-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(10,14,26,0.9); padding:5px 24px; font-size:10px; color:var(--gray); border-top:1px solid var(--line); display:flex; gap:24px; }
</style>
</head>
<body>
<header>
  <div class="logo-placeholder">ADD<br>fifa_logo<br>.jpg</div>
  <div>
    <h1>FIFA World Cup 2026 · Knockout Bracket</h1>
    <p>Round of 32 · R16 · Quarterfinals · Semifinals · Final · June 28 – July 19, 2026</p>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--</div>
    <div id="statusBar" class="loading">Loading bracket…</div>
  </div>
</header>

<div class="bracket-area">
  <div class="bracket-canvas" id="bracketCanvas"></div>
</div>

<div class="note-bar">
  <span>🟡 Gold score = winner &nbsp; ⚫ Dashed border = not yet determined &nbsp; 🟢 Live match</span>
  <span style="margin-left:auto;">Bracket auto-updates hourly · Group stage ends June 27</span>
</div>

<script>
/* ═════════════════════════════════════════════════════════
   BRACKET STATE  – AI fills in team names, scores, statuses
═════════════════════════════════════════════════════════ */
const EMPTY = () => ({ flag:"", name:"TBD", score:null });

let bracket = {
  r32: Array.from({length:16}, (_,i) => ({
    id:`r32-${i+1}`, home:EMPTY(), away:EMPTY(), status:"tbd", winner:null,
    note:`R32 Match ${i+1}`
  })),
  r16: Array.from({length:8},  (_,i) => ({ id:`r16-${i+1}`,  home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`R16 Match ${i+1}` })),
  qf:  Array.from({length:4},  (_,i) => ({ id:`qf-${i+1}`,   home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`QF ${i+1}` })),
  sf:  Array.from({length:2},  (_,i) => ({ id:`sf-${i+1}`,   home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`SF ${i+1}` })),
  final: { id:"final", home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:"Jul 19 · MetLife NJ" },
  champion: { flag:"🏆", name:"TBD" }
};

/* ═════════════════════════════════════════════════════════
   AI BRACKET POLL  – one call per round, run in parallel
═════════════════════════════════════════════════════════ */
const SYSTEM = "You are a JSON-only API. Respond with a valid JSON array only. " +
  "First character must be [ and last must be ]. No prose, no markdown, no code fences.";

async function callRound(prompt) {
  const res = await fetch("https://fifa-proxy.nancyamedeo.workers.dev", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      system: SYSTEM,
      tools: [{ type:"web_search_20250305", name:"web_search" }],
      messages: [{ role:"user", content:prompt }]
    })
  });
  if (!res.ok) { const err = await res.text(); throw new Error("API " + res.status + ": " + err.slice(0,150)); }
  const data = await res.json();
  const text = data.content.filter(b => b.type==="text").map(b => b.text).join("");
  console.log("Round response:", text.slice(0, 300));
  const m = text.match(/\[[\s\S]*\]/);
  if (!m) throw new Error("No JSON array: " + text.slice(0, 150));
  return JSON.parse(m[0]);
}

function matchPrompt(round, count, label, today) {
  return "Today is " + today + ". Search for 2026 FIFA World Cup " + label + " results. " +
    "Return a JSON array of exactly " + count + " matches. Each: " +
    '{"id":"' + round + '-N","homeFlag":"🇺🇸","homeName":"USA","homeScore":2,' +
    '"awayFlag":"🇦🇺","awayName":"Australia","awayScore":1,"status":"done","winner":0} ' +
    "Use homeName/awayName=\"TBD\", homeScore/awayScore=null, status=\"tbd\", winner=null for undecided slots. " +
    "status values: tbd|upcoming|live|done. winner: 0=home, 1=away, null=not played.";
}

function applyRound(key, results) {
  results.forEach((m, i) => {
    if (!bracket[key][i]) return;
    bracket[key][i] = {
      id: m.id || key+"-"+(i+1),
      home:   { flag: m.homeFlag||"", name: m.homeName||"TBD", score: m.homeScore },
      away:   { flag: m.awayFlag||"", name: m.awayName||"TBD", score: m.awayScore },
      status: m.status || "tbd",
      winner: m.winner !== undefined ? m.winner : null,
      note:   m.note || (key.toUpperCase()+" "+(i+1))
    };
  });
}

async function fetchBracket() {
  setStatus("Fetching bracket results…", "loading");
  try {
    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

    const [r32a, r32b, r16, qf, sf] = await Promise.all([
      callRound(matchPrompt("r32", 8, "Round of 32 matches 1-8",  today)),
      callRound(matchPrompt("r32", 8, "Round of 32 matches 9-16", today)),
      callRound(matchPrompt("r16", 8, "Round of 16",              today)),
      callRound(matchPrompt("qf",  4, "Quarterfinals",            today)),
      callRound(matchPrompt("sf",  2, "Semifinals and Final",     today)),
    ]);

    applyRound("r32", [...r32a, ...r32b]);
    applyRound("r16", r16);
    applyRound("qf",  qf);
    applyRound("sf",  sf);

    // Final & champion from sf call (last 2 items if included, else separate)
    if (sf.length >= 3) {
      const f = sf[2];
      bracket.final = {
        id:"final",
        home: { flag:f.homeFlag||"", name:f.homeName||"TBD", score:f.homeScore },
        away: { flag:f.awayFlag||"", name:f.awayName||"TBD", score:f.awayScore },
        status: f.status||"tbd", winner: f.winner!==undefined?f.winner:null,
        note:"Jul 19 · MetLife Stadium, NJ"
      };
      if (sf[3]) bracket.champion = { flag:"🏆", name: sf[3].homeName||"TBD" };
    }

    const now = new Date();
    setStatus("Updated " + now.toLocaleTimeString() + " · Next in 1 hr", "");
  } catch(e) {
    console.error("Bracket fetch error:", e);
    setStatus("Update failed — showing last data", "error");
  }
  renderBracket();
}


/* ═════════════════════════════════════════════════════════
   RENDER
═════════════════════════════════════════════════════════ */
const COL_W   = 178;
const TOTAL_H = 920;

function teamRow(team, isWinner, hasDone) {
  const nameClass = (!team.name || team.name==="TBD") ? "team-label tbd" : "team-label";
  const scoreClass = !hasDone ? "" : isWinner ? "win" : "lose";
  const scoreStr = team.score !== null && team.score !== undefined ? team.score : "";
  return `<div class="team-row ${hasDone && isWinner ? 'winner' : ''}">
    <div class="team-left">
      <span class="flag-s">${team.flag||""}</span>
      <span class="${nameClass}">${team.name||"TBD"}</span>
    </div>
    <span class="team-score ${scoreClass}">${scoreStr}</span>
  </div>`;
}

function matchBox(m) {
  const done = m.status === "done";
  const tbd  = m.status === "tbd";
  const live = m.status === "live";
  const liveDot = live ? `<span class="live-pip"></span>` : "";
  return `<div class="match-box ${tbd?'is-tbd':''} ${live?'is-live':''}">
    ${teamRow(m.home, done && m.winner===0, done)}
    ${teamRow(m.away, done && m.winner===1, done)}
    <div class="match-meta">${liveDot}${m.note||""}</div>
  </div>`;
}

function roundCol(label, sublabel, matches, width) {
  const n    = matches.length;
  const slot = TOTAL_H / n;
  const items = matches.map(m => `
    <div style="height:${slot}px;display:flex;align-items:center;justify-content:center;">
      ${matchBox(m)}
    </div>`).join("");
  return `<div class="round-col" style="width:${width+4}px;flex-shrink:0;">
    <div class="round-label">${label}<span class="round-sublabel">${sublabel}</span></div>
    <div style="height:${TOTAL_H}px;display:flex;flex-direction:column;">${items}</div>
  </div>`;
}

function connector(fromN, toN) {
  const W = 22;
  const fromSlot = TOTAL_H / fromN;
  const toSlot   = TOTAL_H / toN;
  let paths = "";
  for (let i = 0; i < fromN; i++) {
    const y1 = (i + 0.5) * fromSlot;
    const j  = Math.floor(i / 2);
    const y2 = (j + 0.5) * toSlot;
    paths += `<path d="M0 ${y1} H${W/2} V${y2} H${W}" stroke="#2D3748" stroke-width="1.5" fill="none"/>`;
  }
  return `<div class="connector" style="width:${W}px;height:${TOTAL_H}px;margin-top:22px;flex-shrink:0;">
    <svg width="${W}" height="${TOTAL_H}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>
  </div>`;
}

function finalCol() {
  const f = bracket.final;
  const c = bracket.champion;
  const done = f.status === "done";
  return `<div class="final-col">
    <div class="trophy">🏆</div>
    <div class="final-label">WORLD CUP<br>FINAL</div>
    <div style="font-size:9px;color:var(--gray);letter-spacing:1px;text-align:center;">Jul 19 · MetLife Stadium, NJ</div>
    <div class="match-box ${f.status==='tbd'?'is-tbd':''}" style="width:186px;">
      ${teamRow(f.home, done && f.winner===0, done)}
      ${teamRow(f.away, done && f.winner===1, done)}
      <div class="match-meta">${f.note||""}</div>
    </div>
    <div class="champion-box">
      <div class="champion-label">🏆 Champion</div>
      <div class="champion-name">${c.flag||""} ${c.name||"TBD"}</div>
    </div>
    <div style="margin-top:6px;font-size:9px;color:#374151;text-align:center;">3rd Place: Jul 18 · MetLife NJ</div>
  </div>`;
}

function renderBracket() {
  const canvas = document.getElementById("bracketCanvas");
  let html = "";
  const rounds = [
    { label:"Round of 32", sub:"Jun 28–Jul 3", matches:bracket.r32 },
    { label:"Round of 16", sub:"Jul 4–7",      matches:bracket.r16 },
    { label:"Quarterfinals",sub:"Jul 9–11",    matches:bracket.qf  },
    { label:"Semifinals",  sub:"Jul 14–15",    matches:bracket.sf  },
  ];
  rounds.forEach((r, idx) => {
    html += roundCol(r.label, r.sub, r.matches, COL_W);
    const nextN = idx < rounds.length-1 ? rounds[idx+1].matches.length : 1;
    html += connector(r.matches.length, nextN);
  });
  html += finalCol();
  canvas.innerHTML = html;
}

function setStatus(msg, cls) {
  const el = document.getElementById("statusBar");
  el.textContent = msg; el.className = cls || "";
}

function updateClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.getHours().toString().padStart(2,"0") + ":" + n.getMinutes().toString().padStart(2,"0");
}

renderBracket();
fetchBracket();
setInterval(fetchBracket, 60 * 60 * 1000);
setTimeout(() => location.reload(), 15 * 60 * 1000);
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
