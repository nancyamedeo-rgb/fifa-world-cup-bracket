<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 – Knockout Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C9A84C; --gold2:#F0C94A; --navy:#0A0E1A; --navy3:#1A2235;
    --gray:#6B7280; --white:#FFFFFF; --green:#22C55E; --red:#EF4444; --line:#2D3748;
  }
  html,body { width:1920px; height:1080px; overflow:hidden; background:var(--navy); font-family:'Inter',sans-serif; color:var(--white); }

  header { display:flex; align-items:center; gap:20px; padding:8px 32px; background:linear-gradient(135deg,#0A0E1A,#1A2235,#0D1B3E); border-bottom:2px solid var(--gold); height:72px; flex-shrink:0; }
  .logo-placeholder { width:52px; height:52px; border:2px dashed var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--gold); text-align:center; line-height:1.3; padding:4px; flex-shrink:0; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; color:var(--gold2); }
  header p  { font-size:10px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .header-right { margin-left:auto; text-align:right; }
  .clock { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--white); letter-spacing:2px; }
  #statusBar { font-size:10px; color:var(--gray); margin-top:3px; }
  #statusBar.loading { color:var(--gold); }
  #statusBar.error   { color:var(--red); }

  /* ── SCROLL WRAPPER ── */
  .scroll-wrapper { height:988px; overflow:hidden; position:relative; }
  .scroll-track { display:flex; flex-direction:column; }

  /* ── HALF-BRACKET PANEL ── */
  /* Each panel: upper or lower half. Height = 460px each, leaving 28px note bar */
  .half-panel {
    display:flex; align-items:stretch;
    width:1920px; height:470px;
    padding:8px 16px 8px;
    gap:0;
    border-bottom:1px solid #1F2937;
  }
  .half-panel:last-child { border-bottom:none; }

  /* ── ROUND COLUMNS ── */
  .round-col { display:flex; flex-direction:column; flex-shrink:0; }
  .round-label { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--gold); text-align:center; padding-bottom:4px; line-height:1.2; white-space:nowrap; }
  .round-sublabel { font-size:8px; color:var(--gray); font-family:'Inter',sans-serif; display:block; letter-spacing:1px; }
  .round-matches { flex:1; display:flex; flex-direction:column; }

  /* ── MATCH BOX ── */
  .match-box { background:var(--navy3); border:1px solid var(--line); border-radius:6px; overflow:hidden; width:100%; }
  .match-box.is-tbd  { border-style:dashed; opacity:0.5; }
  .match-box.is-live { border-color:var(--green); box-shadow:0 0 8px rgba(34,197,94,0.3); }
  .team-row { display:flex; align-items:center; justify-content:space-between; padding:4px 8px; gap:4px; border-bottom:1px solid rgba(255,255,255,0.05); min-height:24px; }
  .team-row:last-of-type { border-bottom:none; }
  .team-row.winner { background:rgba(201,168,76,0.12); }
  .team-left { display:flex; align-items:center; gap:5px; overflow:hidden; min-width:0; }
  .flag-s { font-size:13px; line-height:1; flex-shrink:0; }
  .team-label { font-size:10px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team-label.tbd  { color:var(--gray); font-weight:400; font-style:italic; font-size:9px; }
  .team-label.seed { color:#60A5FA; font-weight:500; font-size:9px; }
  .team-score { font-family:'Bebas Neue',sans-serif; font-size:14px; flex-shrink:0; min-width:12px; text-align:right; }
  .team-score.win  { color:var(--gold2); }
  .team-score.lose { color:var(--gray); }
  .match-meta { text-align:center; font-size:7px; color:var(--gray); padding:2px 4px; border-top:1px solid rgba(255,255,255,0.04); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .live-pip { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--green); margin-right:3px; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SVG CONNECTOR ── */
  .connector { flex-shrink:0; align-self:stretch; margin-top:24px; }

  /* ── FINAL CENTRE COLUMN ── */
  .final-col {
    flex-shrink:0; width:230px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; padding:0 8px;
  }
  /* Final col spans both halves via a wrapper */
  .bracket-body { display:flex; width:1920px; height:940px; padding:8px 16px; gap:0; }
  .left-side  { flex:1; display:flex; flex-direction:column; gap:0; overflow:hidden; }
  .right-side { width:230px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

  .trophy { font-size:34px; filter:drop-shadow(0 0 10px var(--gold)); }
  .final-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--gold2); text-align:center; line-height:1.2; }
  .final-match-box { background:var(--navy3); border:1px solid var(--line); border-radius:7px; overflow:hidden; width:206px; }
  .final-match-box.is-tbd { border-style:dashed; opacity:0.6; }
  .champion-box { background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(240,201,74,0.05)); border:1px solid var(--gold); border-radius:10px; padding:8px 14px; width:206px; text-align:center; }
  .champion-label { font-size:9px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .champion-name  { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--gold2); }

  .note-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(10,14,26,0.92); padding:4px 24px; font-size:10px; color:var(--gray); border-top:1px solid var(--line); display:flex; gap:24px; }
</style>
</head>
<body>
<header>
  <div class="logo-placeholder">ADD<br>fifa_logo<br>.jpg</div>
  <div>
    <h1>FIFA World Cup 2026 · Knockout Bracket</h1>
    <p>Round of 32 · R16 · Quarterfinals · Semifinals · Final · June 28 – July 19, 2026</p>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--</div>
    <div id="statusBar" class="loading">Loading bracket…</div>
  </div>
</header>

<div style="display:flex; height:988px; overflow:hidden;">
  <!-- Left: scrolling upper+lower halves -->
  <div style="flex:1; overflow:hidden; position:relative;">
    <div id="scrollTrack" style="display:flex; flex-direction:column;"></div>
  </div>
  <!-- Right: Final always visible -->
  <div id="finalCol" style="width:230px; flex-shrink:0; background:var(--navy); border-left:1px solid #1F2937; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:16px;"></div>
</div>

<div class="note-bar">
  <span>🟡 Gold = winner &nbsp;·&nbsp; Dashed = TBD &nbsp;·&nbsp; 🟢 Live</span>
  <span style="margin-left:auto;">Updates hourly · Group stage ends June 27 · Knockout begins June 28</span>
</div>

<script>
/* ═══════════════════════════════════════════════
   BRACKET STATE
═══════════════════════════════════════════════ */
const EMPTY = () => ({ flag:"", name:"TBD", score:null });
let bracket = {
  r32: Array.from({length:16}, (_,i) => ({ id:`r32-${i+1}`, home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`R32 M${i+1}` })),
  r16: Array.from({length:8},  (_,i) => ({ id:`r16-${i+1}`, home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`R16 M${i+1}` })),
  qf:  Array.from({length:4},  (_,i) => ({ id:`qf-${i+1}`,  home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`QF ${i+1}` })),
  sf:  Array.from({length:2},  (_,i) => ({ id:`sf-${i+1}`,  home:EMPTY(), away:EMPTY(), status:"tbd", winner:null, note:`SF ${i+1}` })),
  final:    { home:EMPTY(), away:EMPTY(), status:"tbd", winner:null },
  champion: { flag:"🏆", name:"TBD" }
};

/* ═══════════════════════════════════════════════
   AI POLL
═══════════════════════════════════════════════ */
const SYSTEM = "You are a JSON-only API. Output a valid JSON array only. First char [ last char ]. No prose, no markdown.";

async function callRound(prompt) {
  const res = await fetch("https://fifa-proxy.nancyamedeo.workers.dev", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:2000, system:SYSTEM,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}] })
  });
  if (!res.ok) { const e = await res.text(); throw new Error("API "+res.status+": "+e.slice(0,150)); }
  const data = await res.json();
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  console.log("Round response:", text.slice(0,300));
  const m = text.match(/\[[\s\S]*\]/);
  if (!m) throw new Error("No JSON array: "+text.slice(0,150));
  return JSON.parse(m[0]);
}

function mp(round, count, label, today) {
  return `Today is ${today}. Search for 2026 FIFA World Cup ${label} results. ` +
    `Return a JSON array of exactly ${count} matches. Each: ` +
    `{"id":"${round}-N","homeFlag":"🇺🇸","homeName":"USA","homeScore":2,"awayFlag":"🇦🇺","awayName":"Australia","awayScore":1,"status":"done","winner":0} ` +
    `TBD slots: homeName/awayName="TBD", homeScore/awayScore=null, status="tbd", winner=null. ` +
    `status: tbd|upcoming|live|done. winner: 0=home,1=away,null=not played.`;
}

function applyRound(key, arr) {
  arr.forEach((m,i) => {
    if (!bracket[key][i]) return;
    bracket[key][i] = {
      id: m.id||`${key}-${i+1}`,
      home:  {flag:m.homeFlag||"", name:m.homeName||"TBD", score:m.homeScore},
      away:  {flag:m.awayFlag||"", name:m.awayName||"TBD", score:m.awayScore},
      status:m.status||"tbd", winner:m.winner!==undefined?m.winner:null,
      note:  m.note||(key.toUpperCase()+" "+(i+1))
    };
  });
}

async function fetchBracket() {
  setStatus("Fetching bracket…","loading");
  try {
    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const [ra,rb,r16,qf,sf] = await Promise.all([
      callRound(mp("r32",8,"Round of 32 matches 1-8",today)),
      callRound(mp("r32",8,"Round of 32 matches 9-16",today)),
      callRound(mp("r16",8,"Round of 16",today)),
      callRound(mp("qf", 4,"Quarterfinals",today)),
      callRound(mp("sf", 2,"Semifinals",today)),
    ]);
    applyRound("r32",[...ra,...rb]);
    applyRound("r16",r16);
    applyRound("qf",qf);
    applyRound("sf",sf);
    const now = new Date();
    setStatus("Updated "+now.toLocaleTimeString()+" · Next in 1 hr","");
  } catch(e) {
    console.error("Bracket fetch error:",e);
    setStatus("Update failed — showing last data","error");
  }
  renderBracket();
}

/* ═══════════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════════ */
function isSeed(n) { return n && n!=="TBD" && /winner|runner|3rd|1st|2nd/i.test(n); }

function teamRow(team, isWin, done) {
  const tbd  = !team.name || team.name==="TBD";
  const seed = !tbd && isSeed(team.name);
  const nc   = tbd?"team-label tbd":seed?"team-label seed":"team-label";
  const sc   = !done?"":isWin?"win":"lose";
  const sv   = (team.score!==null&&team.score!==undefined)?team.score:"";
  return `<div class="team-row${done&&isWin?" winner":""}">
    <div class="team-left"><span class="flag-s">${team.flag||""}</span><span class="${nc}">${team.name||"TBD"}</span></div>
    <span class="team-score ${sc}">${sv}</span>
  </div>`;
}

function mbox(m, w) {
  const done=m.status==="done", tbd=m.status==="tbd", live=m.status==="live";
  const pip=live?`<span class="live-pip"></span>`:"";
  return `<div class="match-box${tbd?" is-tbd":""}${live?" is-live":""}" style="width:${w}px">
    ${teamRow(m.home,done&&m.winner===0,done)}
    ${teamRow(m.away,done&&m.winner===1,done)}
    <div class="match-meta">${pip}${m.note||""}</div>
  </div>`;
}

/* Build one half-bracket (upper = indices 0-7, lower = 8-15) */
function buildHalf(half) {
  // half=0: r32[0-7], r16[0-3], qf[0-1], sf[0]
  // half=1: r32[8-15],r16[4-7], qf[2-3], sf[1]
  const o = half * 8;   // r32 offset
  const r32s = bracket.r32.slice(o, o+8);
  const r16s = bracket.r16.slice(half*4, half*4+4);
  const qfs  = bracket.qf.slice(half*2, half*2+2);
  const sf   = bracket.sf[half];

  // Available width for left side = 1920 - 230 (final col) - 32 (padding) = 1658px
  // 4 round cols + 3 connectors. Let col widths be: r32=360, conn=22, r16=280, conn=22, qf=240, conn=22, sf=240 = 1186... 
  // Actually: total=1658. 3 connectors×22=66. Remaining=1592 / 4 cols.
  // r32=420, r16=310, qf=250, sf=250 + 66 = 1296. Hmm, let's just use flex.

  const H = 454; // height of each half panel content area

  function col(matches, w, label, sub) {
    const n    = matches.length;
    const slot = H / n;
    const items = matches.map(m =>
      `<div style="height:${slot}px;display:flex;align-items:center;padding:0 4px;">
         ${mbox(m, w-12)}
       </div>`
    ).join("");
    return `<div style="width:${w}px;flex-shrink:0;display:flex;flex-direction:column;">
      <div class="round-label">${label}<span class="round-sublabel">${sub}</span></div>
      <div style="flex:1;display:flex;flex-direction:column;">${items}</div>
    </div>`;
  }

  function conn(fromN, toN, h) {
    const W=20, fromSlot=h/fromN, toSlot=h/toN;
    let paths="";
    for(let i=0;i<fromN;i++){
      const y1=(i+0.5)*fromSlot, j=Math.floor(i/2), y2=(j+0.5)*toSlot;
      paths+=`<path d="M0 ${y1} H${W/2} V${y2} H${W}" stroke="#2D3748" stroke-width="1.5" fill="none"/>`;
    }
    return `<div style="width:${W}px;flex-shrink:0;margin-top:22px;">
      <svg width="${W}" height="${h}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>
    </div>`;
  }

  return `<div style="display:flex;align-items:stretch;height:${H+24}px;padding:8px 0;">
    ${col(r32s,390,"ROUND OF 32","Jun 28–Jul 3")}
    ${conn(8,4,H)}
    ${col(r16s,295,"ROUND OF 16","Jul 4–7")}
    ${conn(4,2,H)}
    ${col(qfs, 255,"QUARTERFINALS","Jul 9–11")}
    ${conn(2,1,H)}
    ${col([sf], 255,"SEMIFINALS","Jul 14–15")}
    ${conn(1,1,H)}
  </div>`;
}

function buildFinal() {
  const f=bracket.final, c=bracket.champion, done=f.status==="done";
  return `
    <div class="trophy">🏆</div>
    <div class="final-label">WORLD CUP<br>FINAL</div>
    <div style="font-size:8px;color:var(--gray);letter-spacing:1px;text-align:center;margin-bottom:4px;">Jul 19 · MetLife Stadium, NJ</div>
    <div class="final-match-box${f.status==='tbd'?' is-tbd':''}">
      ${teamRow(f.home,done&&f.winner===0,done)}
      ${teamRow(f.away,done&&f.winner===1,done)}
      <div class="match-meta">World Cup Final</div>
    </div>
    <div class="champion-box">
      <div class="champion-label">🏆 Champion</div>
      <div class="champion-name">${c.flag||""} ${c.name||"TBD"}</div>
    </div>
    <div style="font-size:8px;color:#374151;text-align:center;margin-top:4px;">3rd Place: Jul 18 · MetLife NJ</div>`;
}

let scrollPos=0, scrollRAF=null;
function startScroll() {
  if(scrollRAF) cancelAnimationFrame(scrollRAF);
  const track=document.getElementById("scrollTrack");
  const half=track.scrollHeight/2;
  function step(){
    scrollPos+=0.35;
    if(scrollPos>=half) scrollPos=0;
    track.style.transform=`translateY(-${scrollPos}px)`;
    scrollRAF=requestAnimationFrame(step);
  }
  scrollRAF=requestAnimationFrame(step);
}

function renderBracket() {
  const track = document.getElementById("scrollTrack");
  const upper = buildHalf(0);
  const lower = buildHalf(1);
  const divider = `<div style="height:1px;background:var(--line);margin:0 16px;"></div>`;
  const content = upper + divider + lower;
  track.innerHTML = content + content; // duplicate for seamless loop
  document.getElementById("finalCol").innerHTML = buildFinal();
  setTimeout(startScroll, 100);
}

function setStatus(msg,cls){const el=document.getElementById("statusBar");el.textContent=msg;el.className=cls||"";}
function updateClock(){const n=new Date();document.getElementById("clock").textContent=n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");}

renderBracket();
fetchBracket();
setInterval(fetchBracket, 60*60*1000);
setTimeout(()=>location.reload(), 15*60*1000);
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
